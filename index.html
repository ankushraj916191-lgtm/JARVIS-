<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JARVIS AI</title>

  <link rel="stylesheet" href="style.css">

  <style>
    body{
      margin:0;
      background:#08111f;
      color:#00e5ff;
      font-family:Arial,sans-serif;
      text-align:center;
    }

    .top-bar{
      display:flex;
      justify-content:space-between;
      padding:20px;
      font-size:20px;
    }

    .logo{
      font-size:32px;
      font-weight:bold;
    }

    .main{
      margin-top:50px;
    }

    .circle{
      width:250px;
      height:250px;
      border:5px solid cyan;
      border-radius:50%;
      margin:auto;

      display:flex;
      justify-content:center;
      align-items:center;

      animation:spin 8s linear infinite;

      box-shadow:0 0 30px cyan;
    }

    .inner{
      width:150px;
      height:150px;
      border-radius:50%;
      background:rgba(0,255,255,0.1);

      display:flex;
      justify-content:center;
      align-items:center;

      font-size:30px;
      font-weight:bold;
    }

    @keyframes spin{
      from{
        transform:rotate(0deg);
      }
      to{
        transform:rotate(360deg);
      }
    }

    #micBtn{
      margin-top:40px;
      padding:15px 40px;
      border:none;
      border-radius:50px;
      background:cyan;
      color:black;
      font-size:20px;
      cursor:pointer;
    }

    .apps{
      margin-top:40px;
    }

    .apps button{
      margin:10px;
      padding:12px 20px;
      border:none;
      border-radius:10px;
      cursor:pointer;
      background:#00e5ff;
      color:black;
    }
  </style>

</head>
